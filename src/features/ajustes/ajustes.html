<div class="pagina-ajustes" [ngClass]="usuario.theme">

  <!-- HEADER -->
  <div class="header">
    <img src="/Logo MiruZone.png" class="logo">

    <button (click)="cerrarSesion()">Cerrar sesión</button>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="icono">Logo1</div>
    <div class="icono">Logo2</div>
    <div class="icono">Logo3</div>
    <div class="icono">Logo4</div>
    <div class="icono">Logo5</div>

    <div class="menu">
      <a routerLink="/private-feed">Home</a>
      <a routerLink="/anime-deseados">Deseados</a>
      <a routerLink="/animes-vistos">Vistos</a>
      <a routerLink="/animes-proceso">Proceso</a>
      <a routerLink="/ajustes">Ajustes</a>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="contenido">

    <!-- PERFIL -->
    <div class="perfil">

      <!-- AVATAR -->
      <div class="avatar">
        <img [src]="'http://localhost/ProyectoAnime/backend-php/uploads/' + usuario.avatar">

        <input type="file" (change)="cambiarImagen($event)" hidden #file>
        <button class="btn-plus" (click)="file.click()">+</button>
      </div>

      <!-- DESCRIPCIÓN -->
      <textarea class="descripcion"
                [(ngModel)]="usuario.descripcion"
                placeholder="Pon tu descripcion..."></textarea>

    </div>

    <!-- EDITAR + PANEL (AHORA EN FILA) -->
    <div class="edit-container">

      <!-- BOTÓN -->
      <button class="btn-rosa" (click)="editar = !editar">
        Editar perfil
      </button>

      <!-- PANEL A LA DERECHA -->
      <div class="panel-edicion" *ngIf="editar">

        <input [(ngModel)]="usuario.usuario" placeholder="Usuario">
        <input [(ngModel)]="usuario.link" placeholder="Link">

        <button class="btn-rosa btn-aplicar" (click)="guardarCambios()">
          Aplicar
        </button>

        <label class="toggle">
          Modo oscuro
          <input type="checkbox"
                 [checked]="usuario.theme === 'dark'"
                 (change)="cambiarTema()">
        </label>

      </div>

    </div>

  </div>
</div>
