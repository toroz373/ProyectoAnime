<div class="feed-container">
  <div class="feed-header">
    <h1>Feed Público</h1>
    <p>Descubre animes y lee las opiniones de la comunidad</p>
  </div>
  
  <div class="feed-content">
    @for (anime of animes(); track anime.id) {
      <app-anime-card 
        [anime]="anime"
        [isLoggedIn]="false">
      </app-anime-card>
    }
  </div>
</div>
