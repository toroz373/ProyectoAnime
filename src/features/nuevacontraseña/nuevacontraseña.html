<div class="top-left">
    <a routerLink="/" class="back-button">Volver</a>
</div>

<div class="login-container">
    <img src="/Logo MiruZone.png" alt="Logo MiruZone" class="logo">

    <form (ngSubmit)="changePassword()">
        <input type="text" [(ngModel)]="usuario" name="usuario" placeholder="Usuario" required>
        <input type="password" [(ngModel)]="nuevaPassword" name="nuevaPassword" placeholder="Nueva contraseña" required>

        <button type="submit">Guardar contraseña</button>
    </form>
</div>

<footer>
    <p>MiruZone | @create account</p>
</footer>
